<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <!-- Soft circular background in brand-title (forest green) -->
  <circle cx="64" cy="64" r="60" fill="#3a5a40" />
  
  <!-- Subtle inner border in brand-bg (cream) -->
  <circle cx="64" cy="64" r="54" stroke="#f2f1eb" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.8" />
  
  <!-- Monogram A & K in premium serif font styling -->
  <text x="64" y="74" 
        font-family="'Playfair Display', 'Cormorant Garamond', 'Georgia', serif" 
        font-size="44" 
        font-weight="500" 
        fill="#f2f1eb" 
        text-anchor="middle"
        letter-spacing="-1">A &amp; K</text>
        
  <!-- Small decorative heart at the bottom in brand-text (burgundy) -->
  <path d="M64 86 C62 83, 57 83, 57 87 C57 90, 64 94, 64 94 C64 94, 71 90, 71 87 C71 83, 66 83, 64 86 Z" fill="#6e001b" />
</svg>
